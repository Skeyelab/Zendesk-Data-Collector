services:
  web:
    build:
      context: .
      target: production
    command: bundle exec puma -C config/puma.rb
    environment:
      - RAILS_ENV=production
      - SECRET_KEY_BASE=${SERVICE_PASSWORD_WEB:-${SECRET_KEY_BASE}}
      - DATABASE_URL=${DATABASE_URL}
      - DEFAULT_ADMIN_USER=${DEFAULT_ADMIN_USER:-admin@example.com}
      - DEFAULT_ADMIN_PW=${DEFAULT_ADMIN_PW}
      - RAILS_LOG_TO_STDOUT=true
      - RAILS_SERVE_STATIC_FILES=true
      - RAILS_MAX_THREADS=${RAILS_MAX_THREADS:-5}
      - SERVICE_FQDN_WEB_3000
      - RAILS_HOST=${SERVICE_FQDN_WEB_3000}
      - SERVICE_PASSWORD_ENCRYPTION_PRIMARY_KEY_64
      - SERVICE_PASSWORD_ENCRYPTION_DETERMINISTIC_KEY_64
      - SERVICE_PASSWORD_ENCRYPTION_KEY_DERIVATION_SALT_64
      - ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY=${SERVICE_PASSWORD_ENCRYPTION_PRIMARY_KEY_64}
      - ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY=${SERVICE_PASSWORD_ENCRYPTION_DETERMINISTIC_KEY_64}
      - ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT=${SERVICE_PASSWORD_ENCRYPTION_KEY_DERIVATION_SALT_64}
      - WEBHOOKS_TICKETS_SECRET=${WEBHOOKS_TICKETS_SECRET}
    restart: unless-stopped

  worker:
    build:
      context: .
      target: production
    command: bundle exec bin/jobs start
    environment:
      - RAILS_ENV=production
      - SECRET_KEY_BASE=${SERVICE_PASSWORD_WEB:-${SECRET_KEY_BASE}}
      - DATABASE_URL=${DATABASE_URL}
      - RAILS_LOG_TO_STDOUT=true
      - RAILS_MAX_THREADS=${RAILS_MAX_THREADS:-5}
      - SOLID_QUEUE_CONCURRENCY=${SOLID_QUEUE_CONCURRENCY:-5}
      - SERVICE_PASSWORD_ENCRYPTION_PRIMARY_KEY_64
      - SERVICE_PASSWORD_ENCRYPTION_DETERMINISTIC_KEY_64
      - SERVICE_PASSWORD_ENCRYPTION_KEY_DERIVATION_SALT_64
      - ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY=${SERVICE_PASSWORD_ENCRYPTION_PRIMARY_KEY_64}
      - ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY=${SERVICE_PASSWORD_ENCRYPTION_DETERMINISTIC_KEY_64}
      - ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT=${SERVICE_PASSWORD_ENCRYPTION_KEY_DERIVATION_SALT_64}
    restart: unless-stopped
    exclude_from_hc: true

  migrate:
    build:
      context: .
      target: production
    command: bundle exec rails db:migrate
    environment:
      - RAILS_ENV=production
      - SECRET_KEY_BASE=${SERVICE_PASSWORD_WEB:-${SECRET_KEY_BASE}}
      - DATABASE_URL=${DATABASE_URL}
      - SERVICE_PASSWORD_ENCRYPTION_PRIMARY_KEY_64
      - SERVICE_PASSWORD_ENCRYPTION_DETERMINISTIC_KEY_64
      - SERVICE_PASSWORD_ENCRYPTION_KEY_DERIVATION_SALT_64
      - ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY=${SERVICE_PASSWORD_ENCRYPTION_PRIMARY_KEY_64}
      - ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY=${SERVICE_PASSWORD_ENCRYPTION_DETERMINISTIC_KEY_64}
      - ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT=${SERVICE_PASSWORD_ENCRYPTION_KEY_DERIVATION_SALT_64}
    restart: "no"
    exclude_from_hc: true

  seed:
    build:
      context: .
      target: production
    command: bundle exec rails db:seed
    environment:
      - RAILS_ENV=production
      - SECRET_KEY_BASE=${SERVICE_PASSWORD_WEB:-${SECRET_KEY_BASE}}
      - DATABASE_URL=${DATABASE_URL}
      - DEFAULT_ADMIN_USER=${DEFAULT_ADMIN_USER:-admin@example.com}
      - DEFAULT_ADMIN_PW=${DEFAULT_ADMIN_PW}
      - SERVICE_PASSWORD_ENCRYPTION_PRIMARY_KEY_64
      - SERVICE_PASSWORD_ENCRYPTION_DETERMINISTIC_KEY_64
      - SERVICE_PASSWORD_ENCRYPTION_KEY_DERIVATION_SALT_64
      - ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY=${SERVICE_PASSWORD_ENCRYPTION_PRIMARY_KEY_64}
      - ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY=${SERVICE_PASSWORD_ENCRYPTION_DETERMINISTIC_KEY_64}
      - ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT=${SERVICE_PASSWORD_ENCRYPTION_KEY_DERIVATION_SALT_64}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"
    exclude_from_hc: true
